<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { font-family: -apple-system, sans-serif; width: 240px; padding: 12px; margin: 0; }
  h3   { margin: 0 0 8px; font-size: 14px; color: #c00; }
  p    { margin: 4px 0; font-size: 12px; color: #333; }
  button {
    margin-top: 10px; width: 100%; padding: 7px;
    background: #c00; color: white; border: none;
    border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  button:hover { background: #a00; }
  #status { margin-top: 8px; font-size: 11px; color: #666; }
</style>
</head>
<body>
<h3>🚗 Tesla Inventory Tracker</h3>
<p>Scraping Model Y &amp; 3 (new + used) in AU</p>
<p>Runs automatically every 5 minutes.</p>
<p id="lastRun">Last run: loading...</p>
<button id="runNow">Scrape Now</button>
<p id="status"></p>
<script src="popup.js"></script>
</body>
</html>
